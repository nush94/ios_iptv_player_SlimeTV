name: TestFlight

on:
  workflow_dispatch: {}        # trigger manually from the Actions tab
  push:
    branches:
      - claude/iptv-playlist-platform-kusumt   # change to "main" once merged

jobs:
  build:
    runs-on: macos-15          # GitHub-hosted macOS runner with Xcode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install Carthage
        run: brew install carthage

      # GoogleCast.xcframework is gitignored and Google has no stable download
      # URL. Provide a direct zip URL via the GOOGLECAST_SDK_URL secret, OR
      # commit the framework to the repo and delete this step.
      - name: Fetch GoogleCast SDK
        if: ${{ secrets.GOOGLECAST_SDK_URL != '' }}
        env:
          GOOGLECAST_SDK_URL: ${{ secrets.GOOGLECAST_SDK_URL }}
        run: |
          curl -L "$GOOGLECAST_SDK_URL" -o googlecast.zip
          unzip -q googlecast.zip -d googlecast_sdk
          FW=$(find googlecast_sdk -name "GoogleCast.xcframework" -type d | head -1)
          rm -rf sources/GoogleCast.xcframework
          cp -R "$FW" sources/GoogleCast.xcframework

      - name: Write App Store Connect API key file
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          echo -n "$ASC_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc_key.p8"
          echo "ASC_KEY_PATH=$RUNNER_TEMP/asc_key.p8" >> "$GITHUB_ENV"

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build & upload to TestFlight
        env:
          CI: "true"
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: bundle exec fastlane beta
