name: TestFlight

on:
  workflow_dispatch: {}        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - claude/iptv-playlist-platform-kusumt   # change to "main" once merged

jobs:
  build:
    runs-on: macos-15          # GitHub-hosted macOS runner with Xcode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install Carthage
        run: brew install carthage

      # GoogleCast.xcframework is gitignored, so the runner must fetch it.
      # Put a direct download URL to the GoogleCast iOS SDK zip in the
      # GOOGLECAST_SDK_URL secret. If you instead commit the framework to the
      # repo, you can delete this step.
      - name: Fetch GoogleCast SDK
        if: ${{ secrets.GOOGLECAST_SDK_URL != '' }}
        env:
          GOOGLECAST_SDK_URL: ${{ secrets.GOOGLECAST_SDK_URL }}
        run: |
          curl -L "$GOOGLECAST_SDK_URL" -o googlecast.zip
          unzip -q googlecast.zip -d googlecast_sdk
          # Move the .xcframework to where the project expects it.
          FW=$(find googlecast_sdk -name "GoogleCast.xcframework" -type d | head -1)
          rm -rf sources/GoogleCast.xcframework
          cp -R "$FW" sources/GoogleCast.xcframework

      - name: Install code signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build & upload to TestFlight
        env:
          CI: "true"
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: bundle exec fastlane beta
